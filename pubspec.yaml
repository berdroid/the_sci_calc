name: the_sci_calc
description: "The scientific calculator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0

  # Immutable models + code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Exact arithmetic
  rational: ^2.2.0

  # Persistence
  shared_preferences: ^2.3.0

  # Dependency injection
  get_it: ^9.2.1

  # Unique IDs
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  build_runner: ^2.4.11

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Icon generation
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  # Standard icon (iOS, macOS, Windows, Web, Linux)
  image_path: "assets/icons/app_icon.png"
  # Android
  android: true
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  # iOS
  ios: true
  remove_alpha_ios: true
  # Web
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0D47A1"
    theme_color: "#1976D2"
  # Windows
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  # macOS
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
