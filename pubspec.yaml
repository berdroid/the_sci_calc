name: the_sci_calc
description: "The scientific calculator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0

  # Immutable models + code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Exact arithmetic
  rational: ^2.2.0

  # Persistence
  shared_preferences: ^2.3.0

  # Dependency injection
  get_it: ^7.7.0

  # Unique IDs
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.11

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
